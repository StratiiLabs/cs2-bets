name: CLV capture

# Захоплює закривальну лінію (CLV) у хмарі — комп'ютер не потрібен.
#
# Чому НЕ просто "*/5 cron": безкоштовний GitHub сильно тротлить часті
# розклади (фактично спрацьовує раз на 1-2 год). Тому замість цього кілька
# разів на день СТАРТУЄМО джобу, а всередині неї крутимо власний цикл, що
# захоплює лінію кожні 5 хв до локу останнього матчу. Гранулярність уже не
# залежить від примх cron.
#
# ВАЖЛИВО: репозиторій має бути PUBLIC — джоба живе годинами, а на public
# хвилини Actions безкоштовні. На private це швидко з'їсть ліміт 2000 хв/міс.

on:
  workflow_dispatch: {}
  schedule:
    # Стартуємо що 2 год у вікні 06:00–20:00 UTC. Кожен старт перечитує
    # незакриті ставки й ловить нові, додані з моменту попереднього старту.
    - cron: "0 6-20/2 * * *"

concurrency:
  group: clv-capture
  cancel-in-progress: true   # новий старт замінює старий цикл (свіжий список ставок)

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 350       # < 6 год ліміту джоби
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name  "clv-bot"
          git config user.email "actions@github.com"

      - name: Capture loop until last match locks
        run: |
          cd scripts
          END=$(python3 clv.py endtime || true)
          if [ -z "$END" ]; then
            echo "No pending bets with match_slug — nothing to capture."
            exit 0
          fi
          STOP=$((END + 180))          # 3 хв після старту останнього матчу
          NOW=$(date +%s)
          MAXEND=$((NOW + 20400))      # запобіжник: максимум ~5г40хв
          if [ "$STOP" -gt "$MAXEND" ]; then STOP=$MAXEND; fi
          echo "Looping until $(date -u -d @$STOP) UTC"
          while [ "$(date +%s)" -lt "$STOP" ]; do
            python3 clv.py capture || true
            cd ..
            if git status --porcelain bets.csv | grep -q .; then
              git add bets.csv
              git commit -m "chore(clv): capture closing line [skip ci]"
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
              git push || true
              echo "Pushed CLV update at $(date -u)."
            else
              echo "No change at $(date -u)."
            fi
            cd scripts
            sleep 300
          done
          echo "Done — last match locked."
